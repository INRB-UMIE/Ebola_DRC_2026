notes: |
  Raw workbook: raw/Plan_Decentralisation_Ebola_RDC.xlsx (decentralised PCR capacity by
  health zone). Processed snapshot: africa_cdc__testing_capacity__static_matrix.csv
  (wide table with PCR_machines and PCR_tests per zone). Contract outputs for QA and
  GeoJSON build:
    - testing_capacity__pcr_machines__static.csv
    - testing_capacity__pcr_tests__static.csv
  Zone names are matched to canonical Nom via data/aliases.csv (e.g. Mungwalu → Mongbalu).
  Coverage: outbreak-affected zones listed in the decentralisation plan (partial national).
